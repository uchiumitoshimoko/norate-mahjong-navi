version: '3.8'

services:
  web:
    build:
      context: ./docker/php
    container_name: mahjang_web
    ports:
      - "8080:80"
      - "8081:8081"
    volumes:
      - ./src:/var/www/html
      - ./docker/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      DB_HOST: db
      DB_USER: cakephp
      DB_PASS: cakephp
      DB_NAME: mahjang_kenko
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7
    container_name: mahjang_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mahjang_kenko
      MYSQL_USER: cakephp
      MYSQL_PASSWORD: cakephp
    volumes:
      - ./db/LAA1076539-kenko.sql:/tmp/mahjang-dump.sql:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
